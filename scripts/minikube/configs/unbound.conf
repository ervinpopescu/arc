server:
    verbosity: 1

    # Listen on the minikube bridge and loopback
    interface: 192.168.49.1
    interface: 127.0.0.1
    port: 53

    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # Only allow queries from localhost and minikube subnet
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: 192.168.49.0/24 allow

    # Caching - keep external records for a long time
    cache-min-ttl: 300
    cache-max-ttl: 86400
    serve-expired: yes
    serve-expired-ttl: 3600

    # Performance
    num-threads: 2
    msg-cache-size: 64m
    rrset-cache-size: 128m
    neg-cache-size: 16m
    prefetch: yes
    prefetch-key: yes

    # Don't log every query
    log-queries: no

forward-zone:
    name: "."
    forward-addr: 100.100.1.1
    forward-addr: 100.100.0.1
